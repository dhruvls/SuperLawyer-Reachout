databases:
  - name: superlawyer-db
    plan: free
    databaseName: superlawyer

services:
  - type: web
    name: super-lawyer-reachout
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --log-level info --timeout 600
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: superlawyer-db
          property: connectionString
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: GEMMA_MODEL
        value: gemma-3-27b-it
      - key: SMTP_SERVER
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SENDER_NAME
        sync: false
